name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------
  # OpenAPI: 本番 GitHub Pages デプロイ（ルートパス）
  # ----------------------------------------------------------------
  deploy-docs:
    name: Deploy API Docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI specification
        run: npm run lint

      - name: Build documentation
        run: |
          npm run build
          npm run bundle

      - name: Prepare output
        run: |
          mkdir -p out/downloads
          cp site/index.html out/index.html
          cp dist/openapi-bundled.yaml out/downloads/openapi.yaml
          cp dist/openapi-bundled.json out/downloads/openapi.json

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/
          branch: gh-pages
          clean: false

  # ----------------------------------------------------------------
  # Docker: Build & Push to GHCR (latest タグ)
  # ----------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ----------------------------------------------------------------
  # Railway: latest イメージを再デプロイ
  # ----------------------------------------------------------------
  railway-redeploy:
    name: Railway Redeploy
    runs-on: ubuntu-latest
    needs: docker-build-push

    container:
      image: ghcr.io/railwayapp/cli:latest

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Redeploy service
        run: railway redeploy --service=${{ secrets.RAILWAY_SERVICE_ID }} --yes
