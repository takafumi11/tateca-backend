name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event.action != 'closed' }}

jobs:
  # ----------------------------------------------------------------
  # Test: テスト実行（マージブロッカー）
  # ----------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run tests
        run: ./gradlew test
        env:
          CI: 'true'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/jacoco/
            build/reports/tests/
          retention-days: 7

  # ----------------------------------------------------------------
  # OpenAPI Lint: スペック検証
  # ----------------------------------------------------------------
  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI specification
        run: npm run lint

  # ----------------------------------------------------------------
  # OpenAPI Preview Deploy: ブランチ名パスで GitHub Pages にデプロイ
  # ----------------------------------------------------------------
  openapi-preview:
    name: OpenAPI Preview Deploy
    runs-on: ubuntu-latest
    needs: openapi-lint
    if: github.event.action != 'closed'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: |
          npm run build
          npm run bundle

      - name: Prepare output
        run: |
          mkdir -p out/downloads
          cp site/index.html out/index.html
          cp dist/openapi-bundled.yaml out/downloads/openapi.yaml
          cp dist/openapi-bundled.json out/downloads/openapi.json

      - name: Compute safe branch name
        id: branch
        run: |
          SAFE=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/
          branch: gh-pages
          target-folder: ${{ steps.branch.outputs.safe }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const safe = '${{ steps.branch.outputs.safe }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/${safe}/`;
            const body = [
              '## OpenAPI Preview',
              '',
              `${url}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('OpenAPI Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body,
              });
            }

  # ----------------------------------------------------------------
  # Cleanup: PR クローズ時にプレビューを削除
  # ----------------------------------------------------------------
  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Remove preview folder
        run: |
          SAFE=$(echo "${{ github.head_ref }}" | tr '/' '-')

          if ! git ls-remote --heads origin gh-pages | grep -q .; then
            echo "gh-pages branch does not exist, skipping."
            exit 0
          fi

          git fetch origin gh-pages
          git checkout gh-pages

          if [ -d "$SAFE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            rm -rf "$SAFE"
            git add -A
            git commit -m "chore: remove preview for ${SAFE}"
            git push origin gh-pages
          else
            echo "Preview folder '${SAFE}' not found, skipping."
          fi
